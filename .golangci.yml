version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gocritic
    - revive
  settings:
    gocritic:
      disabled-checks:
        - ifElseChain
    revive:
      rules:
        - name: exported
          disabled: true
  exclusions:
    rules:
      # Tests may use _ for intentional error drops and naked returns.
      - path: _test\.go
        linters:
          - errcheck
          - revive

formatters:
  enable:
    - gofmt
    - goimports
